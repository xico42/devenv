linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - goimports
    - misspell
    - gosec
    - wrapcheck

linters-settings:
  goimports:
    local-prefixes: github.com/xico42/codeherd

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - wrapcheck
        - gosec
